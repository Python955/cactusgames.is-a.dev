<!DOCTYPE html>
<html>
<head>
    <title>Cactus Games</title>
    <link rel="icon" type="image/x-icon" href="Resources/boykisser-dance.gif">
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #000;
    }
    @font-face {
      font-family: 'headerfont';
      src: url('Fonts/Brush.ttf') format('truetype');
    }
    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(-50px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes rainbowAnimation {
        0% {
            background-position: 0% 50%;
        }
        100% {
            background-position: 100% 50%;
        }
    }
    
    h1.rainbow {
        font-size: 120px;
        font-family: 'headerfont', sans-serif;
        background: linear-gradient(
            to right,
            red, orange, yellow, green, blue, indigo, violet, red,
            orange, yellow, green, blue, indigo, violet, red
        );
        background-size: 200% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
    
        animation: rainbowAnimation 6s linear infinite,
                   fadeIn 2s ease-out forwards;
    
        margin: 0;
        padding-top: 150px;
    }


    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
    }
  
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
    }

    .button-group {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 24px;
    }

    .button-group button {
        background-color: #fff;
        color: #000;
        border: 2px solid #000;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button-group button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }
</style>
</head>
<body>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="Resources/file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1 class="rainbow">Cactus Games</h1>
        <p>Welcome to the Cactus Games website!</p>
        <div class="button-group">
            <button id="goBtn">FPMC</button>
            <button id="CactusHubBtn">Cactus Hub</button>
            <button id="CactusOSBtn">CactusOS</button>
        </div>
    </div>
    <script src="JS/script.js"></script>
</body>
</html>
